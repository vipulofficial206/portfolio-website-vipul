version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    container_name: vipul-portfolio-frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - server

  server:
    build:
      context: ./server
    container_name: vipul-portfolio-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./server:/app
      - /app/node_modules
